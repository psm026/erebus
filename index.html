<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JC — Designer &amp; Developer</title>
  <meta name="description" content="Selected design and development work by JC — interactive dream spaces, brands, and web experiences." />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#030307" />
  <meta property="og:title" content="JC — Designer &amp; Developer" />
  <meta property="og:description" content="A portfolio descending through Erebus. Selected work by JC." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="script.js?v=3"></script>
  <script>
    // rescue hatch: if the module/CDN never loads, don't strand visitors on the loader
    setTimeout(function () {
      if (!window.__erebusBooted) document.body.classList.add('no-webgl', 'world-ready');
    }, 6000);
  </script>
</head>
<body>
  <a class="skip" href="#content">Skip to content</a>

  <!-- The world -->
  <canvas id="erebus" aria-hidden="true"></canvas>

  <!-- Loader -->
  <div id="loader" role="status" aria-live="polite">
    <div class="loader-inner">
      <span class="loader-label">Descending into Erebus</span>
      <span class="loader-count" id="loader-count">000</span>
    </div>
  </div>

  <!-- HUD -->
  <header class="hud">
    <div class="hud-left">
      <span class="hud-mono">JC</span>
      <span class="hud-sub">Designer &amp; Developer</span>
    </div>
    <div class="hud-right">
      <span id="hud-sector">EREBUS // DRIFT</span>
      <span id="hud-time">00:00</span>
    </div>
  </header>

  <div class="hud-bottom">
    <span id="hud-index"></span>
    <div class="progress" aria-hidden="true"><div id="progress-fill"></div></div>
    <span class="hud-hint" id="hud-hint">Scroll to drift</span>
  </div>

  <!-- Panels are built by script.js from world.json — the world is data -->
  <main id="content"></main>

  <!-- Hidden-thing overlay (easter eggs) -->
  <div id="egg-veil" role="dialog" aria-modal="true" aria-label="Hidden discovery">
    <div class="egg-card">
      <p class="eyebrow egg-eyebrow"></p>
      <h2 class="egg-title"></h2>
      <p class="p-desc egg-body"></p>
      <button class="p-link egg-close" type="button">Return to the dark</button>
    </div>
  </div>

  <!-- Invisible scroll runway; height is set by script.js -->
  <div id="scroll-space" aria-hidden="true"></div>

  <noscript>
    <style>
      #loader, #erebus { display: none; }
      .panel { position: static !important; opacity: 1 !important; transform: none !important; margin: 18vh 7vw; }
      #scroll-space { display: none; }
    </style>
    <p style="position:fixed;bottom:1rem;left:1rem;font-size:12px;opacity:.6">This site renders Erebus in real time with JavaScript — showing the plain version.</p>
  </noscript>
</body>
</html>
